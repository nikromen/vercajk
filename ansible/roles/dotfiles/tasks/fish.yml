---
- name: Create tmp dir
  tempfile:
    state: directory
    suffix: _fish_files
  register: dotfiles_fish_temp_dir

- name: Generate and sync fish config
  block:
    - name: Generate fish variables from bash variables
      command:
        cmd: vercajk fish --path {{ dotfiles_fish_temp_dir.path }} variables
      changed_when: false

    - name: Rsync variables to fish config
      ansible.posix.synchronize:
        src: "{{ dotfiles_fish_temp_dir.path }}/variables/"
        dest: "{{ home_dir }}/.config/fish/conf.d/"
        checksum: true
        recursive: true
        times: false

    - name: Generate fish scripts from bash scripts in bashrc
      command:
        cmd: vercajk fish --path {{ dotfiles_fish_temp_dir.path }} scripts
      changed_when: false

    - name: Rsync scripts to fish config
      ansible.posix.synchronize:
        src: "{{ dotfiles_fish_temp_dir.path }}/call_in_bash_scripts.fish"
        dest: "{{ home_dir }}/.config/fish/functions/"
        checksum: true
        recursive: true
        times: false

  always:
    - name: Clean up temporary directory
      file:
        path: "{{ dotfiles_fish_temp_dir.path }}"
        state: absent
